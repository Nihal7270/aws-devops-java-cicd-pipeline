---
- name: Deploy WAR to Tomcat servers
  hosts: all
  become: yes
  vars:
    war_source: "/var/lib/jenkins/workspace/ci-cd-project/target/NETFLIX-1.2.2.war"
    deployed_war: "/root/tomcat/webapps/ROOT.war"

  tasks:
    - name: Remove old WAR
      file:
        path: "{{ deployed_war }}"
        state: absent

    - name: Copy new WAR
      copy:
        src: "{{ war_source }}"
        dest: "{{ deployed_war }}"
        mode: '0644'

    - name: Stop Tomcat if running
      shell: /opt/tomcat/bin/shutdown.sh || true
      ignore_errors: yes

    - name: Wait for Tomcat to stop
      pause:
         seconds: 5

    - name: Start Tomcat
      shell: /root/tomcat/bin/startup.sh
